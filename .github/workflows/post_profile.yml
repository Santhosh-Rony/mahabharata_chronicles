name: Daily Profile Post

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate_and_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Install System Dependencies (for video rendering)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate Content and Render Video
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_FALLBACK_API_KEY: ${{ secrets.OPENROUTER_FALLBACK_API_KEY }}
          OPENROUTER_FALLBACK_API_KEY_1: ${{ secrets.OPENROUTER_FALLBACK_API_KEY_1 }}
          OPENROUTER_FALLBACK_API_KEY_2: ${{ secrets.OPENROUTER_FALLBACK_API_KEY_2 }}
          OPENROUTER_FALLBACK_API_KEY_3: ${{ secrets.OPENROUTER_FALLBACK_API_KEY_3 }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.event.repository.name }}
        run: |
          python main.py profile

      - name: Commit and Push Video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ output/ posted_characters.json posting_state.json
          git commit -m "Auto-update daily profile video and history" || echo "No changes to commit"
          git push

      - name: Wait for GitHub Pages Deployment
        run: |
          VIDEO_URL=$(python -c 'import json; print(json.load(open("output/post_metadata.json"))["video_url"])')
          echo "Polling URL: $VIDEO_URL"
          
          # Wait up to 6 minutes for deployment
          for i in {1..36}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" "$VIDEO_URL")
            if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 206 ]; then
              echo "Video is publicly available."
              exit 0
            fi
            echo "Attempt $i: Received HTTP $STATUS. Waiting 10 seconds..."
            sleep 10
          done
          
          echo "Error: Video failed to become available after 6 minutes."
          exit 1

      - name: Publish to Instagram
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
        run: |
          python publish_instagram.py

      - name: Clean Up Media Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f output/*.png output/*.mp4 docs/*.mp4 docs/*.png
          git add docs/ output/
          git commit -m "Auto-cleanup published media files" || echo "No files to clean up"
          git push
